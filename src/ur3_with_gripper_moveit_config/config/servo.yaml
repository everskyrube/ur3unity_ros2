###############################################
# moveit_servo parameters for UR3 + Robotiq 2F-140
# Input is unitless joystick values in [-1, 1].
###############################################

use_gazebo: false

## Input scaling — joystick is unitless, scales turn it into velocity targets
command_in_type: "unitless"
scale:
  linear:     0.4   # m per publish_period max when stick is fully deflected
  rotational: 1.2   # rad per publish_period
  joint:      0.5   # rad per publish_period for JointJog mode

system_latency_compensation: 0.04

## Publish rate and smoothing
publish_period: 0.02          # 50 Hz servo output
low_latency_mode: false
smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

## Output
command_out_type: std_msgs/Float64MultiArray
command_out_topic: /forward_position_controller/commands
publish_joint_positions: true
publish_joint_velocities: false
publish_joint_accelerations: false

## MoveIt group + frames
move_group_name: ur_manipulator
planning_frame: base_link
ee_frame_name: tool0
robot_link_command_frame: base_link

## Input topics
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
status_topic: ~/status

## Command timeouts
incoming_command_timeout: 0.3
num_outgoing_halt_msgs_to_publish: 4
halt_all_joints_in_joint_mode: true
halt_all_joints_in_cartesian_mode: true

## Singularity handling — disabled for Unity visualization (no hardware)
## Thresholds are Jacobian condition-number cutoffs; pushing them past any realistic
## value effectively disables the check. NOTE: near actual singularities, the inverse
## Jacobian produces huge joint velocities — expect the arm to whip in the viz when
## you extend it fully or line up joint axes. Lower these again if that bothers you.
lower_singularity_threshold: 1.0e12
hard_stop_singularity_threshold: 1.0e15
leaving_singularity_threshold_multiplier: 2.0

## Collision checking (disabled for viz-only; no real hardware to protect)
is_primary_planning_scene_monitor: true
check_collisions: false
collision_check_rate: 10.0
self_collision_proximity_threshold: 0.01
scene_collision_proximity_threshold: 0.02
collision_distance_safety_factor: 1000.0
min_allowable_collision_distance: 0.01
