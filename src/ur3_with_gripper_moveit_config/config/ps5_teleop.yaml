ps5_to_servo_teleop:
  ros__parameters:
    deadzone: 0.12

    # Arm (Manipulator mode) scales
    linear_scale: 0.9
    angular_scale: 0.9
    joint_scale: 0.9

    # Driving mode scales (Jackal UGV)
    drive_linear_scale: 0.5
    drive_angular_scale: 1.0

    # Frames
    base_frame: base_link
    ee_frame: tool0

    # Gripper (finger_joint is revolute, 0 open -> 0.695 closed on a 2F-140)
    gripper_min: 0.0
    gripper_max: 0.695
    gripper_step: 0.02
    gripper_rate_hz: 50.0

    # Watchdog — zero both agents if /joy goes silent
    watchdog_timeout: 0.3

    # DualSense axis indices (Linux hid-playstation / evdev)
    axis_left_x:   0
    axis_left_y:   1
    axis_l2:       4
    axis_right_x:  2
    axis_right_y:  3
    axis_r2:       5
    axis_dpad_x:   6
    axis_dpad_y:   7

    # DualSense button indices
    btn_cross:     0   # X — open gripper
    btn_circle:    1   # O — close gripper
    btn_square:    2
    btn_triangle:  3
    btn_l1:        9   # Joint-jog modifier (hold in MANIPULATOR mode)
    btn_r1:        10  # Mode toggle (DRIVING <-> MANIPULATOR)
    btn_l2:        6
    btn_r2:        7
    btn_dpad_up:   11
    btn_dpad_down: 12
